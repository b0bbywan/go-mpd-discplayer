name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install cgo dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdiscid-dev libudev-dev

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
