name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv6
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build binary
        run: make build-${{ matrix.arch }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.arch }}-${{ github.sha }}
          path: dist/mpd-discplayer-${{ matrix.arch }}
          retention-days: 7

      - name: Install nfpm
        if: startsWith(github.ref, 'refs/tags/v')
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Build deb package
        if: startsWith(github.ref, 'refs/tags/v')
        run: make deb-${{ matrix.arch }}

      - name: Upload deb package
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.arch }}-${{ github.sha }}
          path: dist/*.deb
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*-${{ github.sha }}
          merge-multiple: true
          path: dist/

      - name: Download all deb packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*-${{ github.sha }}
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  notify-apt-repo:
    name: Trigger APT repo update
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions: {}

    steps:
      - name: Trigger apt-repo rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.APT_REPO_TOKEN }}
          repository: b0bbywan/odio-apt-repo
          event-type: release-published
          client-payload: '{"repo": "${{ github.repository }}", "tag": "${{ github.ref_name }}"}'
